suite: External Secrets Operator
templates:
  - app.yaml

# With ../ci/01-defaults.yaml: 3 docs  (Deployment + PDB + Service)
# With ../ci/04-eso.yaml:      22 docs (3 baseline + 19 ESO resources)
#   ExternalSecret, SecretStore, ClusterSecretStore, ClusterExternalSecret,
#   PushSecret, ClusterPushSecret,
#   ACRAccessToken, ECRAuthorizationToken, STSSessionToken, ClusterGenerator,
#   GCRAccessToken, GithubAccessToken, VaultDynamicSecret, Webhook,
#   Password, MFA, SSHKey, Fake, UUID

tests:
  # ── Absence checks (no ESO resources in the default scenario) ──────────

  - it: no ESO resources rendered by default
    values:
      - ../ci/01-defaults.yaml
    asserts:
      - hasDocuments:
          count: 3  # Deployment + PDB + Service only

  # ── ExternalSecret ─────────────────────────────────────────────────────

  - it: ExternalSecret renders from eso.externalSecrets dict
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: ExternalSecret
          apiVersion: external-secrets.io/v1
          any: true

  - it: ExternalSecret is also rendered via ci/03-full.yaml
    values:
      - ../ci/03-full.yaml
    asserts:
      - containsDocument:
          kind: ExternalSecret
          apiVersion: external-secrets.io/v1
          any: true

  # ── SecretStore ────────────────────────────────────────────────────────

  - it: SecretStore renders from eso.secretStores dict
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: SecretStore
          apiVersion: external-secrets.io/v1
          any: true

  # ── ClusterSecretStore ─────────────────────────────────────────────────

  - it: ClusterSecretStore renders from eso.clusterSecretStores dict
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: ClusterSecretStore
          apiVersion: external-secrets.io/v1
          any: true

  # ── ClusterExternalSecret ──────────────────────────────────────────────

  - it: ClusterExternalSecret renders from eso.clusterExternalSecrets dict
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: ClusterExternalSecret
          apiVersion: external-secrets.io/v1
          any: true

  # ── PushSecret ─────────────────────────────────────────────────────────

  - it: PushSecret renders from eso.pushSecrets dict
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: PushSecret
          apiVersion: external-secrets.io/v1alpha1
          any: true

  # ── ClusterPushSecret ──────────────────────────────────────────────────

  - it: ClusterPushSecret renders from eso.clusterPushSecrets dict
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: ClusterPushSecret
          apiVersion: external-secrets.io/v1alpha1
          any: true

  # ── Generators ─────────────────────────────────────────────────────────

  - it: ECRAuthorizationToken generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: ECRAuthorizationToken
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: STSSessionToken generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: STSSessionToken
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: ClusterGenerator renders (cluster-scoped)
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: ClusterGenerator
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: GCRAccessToken generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: GCRAccessToken
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: Password generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: Password
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: Fake generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: Fake
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: GithubAccessToken generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: GithubAccessToken
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: VaultDynamicSecret generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: VaultDynamicSecret
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: Webhook generator renders (cluster-scoped)
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: Webhook
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: MFA generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: MFA
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: SSHKey generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: SSHKey
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  - it: UUID generator renders
    values:
      - ../ci/04-eso.yaml
    asserts:
      - containsDocument:
          kind: UUID
          apiVersion: generators.external-secrets.io/v1alpha1
          any: true

  # ── Total document count ───────────────────────────────────────────────

  - it: renders all 22 documents with full ESO values
    values:
      - ../ci/04-eso.yaml
    asserts:
      - hasDocuments:
          count: 22
