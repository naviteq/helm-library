# ============================================================
# ci/03-full.yaml — every available value exercised at once
# Used to verify all template branches render without errors.
# ============================================================

# ── Common ───────────────────────────────────────────────────
commonLabels:
  env: test
  team: platform

commonAnnotations:
  managed-by: helm-library
  ci: "true"

annotations:
  deployment.kubernetes.io/test: "true"

labels:
  project: test-consumer
  tier: backend

# ── Image ────────────────────────────────────────────────────
image:
  registry: docker.io
  repository: nginx
  tag: "1.25"
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# ── Workload ─────────────────────────────────────────────────
replicaCount: 2
revisionHistoryLimit: 5

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 60
podRestartPolicy: Always
schedulerName: default-scheduler
priorityClassName: ""

# ── Ports ────────────────────────────────────────────────────
ports:
  - name: http
    containerPort: 8080
    protocol: TCP
  - name: metrics
    containerPort: 9090
    protocol: TCP

# ── Command / Args ───────────────────────────────────────────
command:
  - /bin/sh
  - -c
args:
  - "nginx -g 'daemon off;'"

# ── Environment variables ────────────────────────────────────
envVars:
  APP_ENV: production
  LOG_LEVEL: info
  POD_NAME:
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  POD_IP:
    valueFrom:
      fieldRef:
        fieldPath: status.podIP

envVarsConfigMap: test-app-env-config
# checkov:skip=CKV_SECRET_6: false positive
envVarsSecret: test-app-env-secret

# ── External secrets (mounted + env) ─────────────────────────
# Referenced by name — secret must exist in the cluster at deploy time
externalSecrets:
  database-creds:
    mounted: true
    mountPath: /app/db-creds
  api-tokens:
    mounted: false

# ── Diagnostic mode (disabled — keeps probes active) ─────────
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

# ── Probes ───────────────────────────────────────────────────
livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  exec:
    command:
      - /bin/sh
      - -c
      - "curl -sf http://localhost:8080/healthz"
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30
  successThreshold: 1

# ── Security contexts ─────────────────────────────────────────
podSecurityContext:
  enabled: true
  fsGroup: 1001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ── Resources ────────────────────────────────────────────────
resources:
  requests:
    memory: 256Mi
    cpu: 200m
  limits:
    memory: 512Mi
    cpu: 500m

# ── Lifecycle hooks ──────────────────────────────────────────
lifecycleHooks:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]
  postStart:
    exec:
      command: ["/bin/sh", "-c", "echo container started"]

# ── Pod metadata ─────────────────────────────────────────────
podLabels:
  app.type: web

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"

# ── Scheduling ───────────────────────────────────────────────
podAntiAffinityPreset: hard

nodeAffinityPreset:
  type: soft
  key: topology.kubernetes.io/zone
  values:
    - us-east-1a
    - us-east-1b

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - key: "node-role.kubernetes.io/spot"
    operator: Exists
    effect: NoSchedule

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-consumer

hostAliases:
  - ip: "127.0.0.1"
    hostnames:
      - localhost.local

# ── Extra volumes / mounts ───────────────────────────────────
extraVolumes:
  - name: tmp-dir
    emptyDir: {}

extraVolumeMounts:
  - name: tmp-dir
    mountPath: /tmp

# ── Init containers & sidecars ───────────────────────────────
initContainers:
  - name: init-wait
    image: busybox:1.36
    command: ["sh", "-c", "echo init complete"]

sidecars:
  - name: log-shipper
    image: busybox:1.36
    command: ["sh", "-c", "while true; do sleep 30; done"]

# ── ConfigMaps ───────────────────────────────────────────────
configMaps:
  app-config:
    mounted: true
    mountPath: /app/config
    defaultMode: 0644
    data:
      config.yaml: |
        env: production
        debug: false
      app.properties: |
        server.port=8080
        server.host=0.0.0.0
    labels:
      config-type: app
    annotations:
      helm.sh/resource-policy: keep
  env-config:
    mounted: false
    data:
      DEBUG: "false"
      LOG_LEVEL: info

# ── Secret ───────────────────────────────────────────────────
secret:
  type: Opaque
  stringData:
    # checkov:skip=CKV_SECRET_6: test data
    API_KEY: test-api-key
    # checkov:skip=CKV_SECRET_6: test data
    DB_PASSWORD: test-db-password
  mounted: true
  mountPath: /app/secrets
  defaultMode: 0400
  items:
    - key: API_KEY
      path: api-key
  labels:
    secret-type: credentials
  annotations:
    helm.sh/resource-policy: keep

# ── Ingress ──────────────────────────────────────────────────
ingress:
  enabled: true
  hostname: app.example.com
  path: /
  pathType: Prefix
  ingressClassName: nginx
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  extraHosts:
    - name: www.app.example.com
      path: /
  extraTls:
    - hosts:
        - www.app.example.com
      secretName: www-app-example-com-tls
  extraPaths:
    - path: /api
      pathType: Prefix
      backend:
        service:
          name: api-service
          port:
            name: http

# ── Service ──────────────────────────────────────────────────
service:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: metrics
  test: /healthz
  sessionAffinity: ClientIP
  annotations:
    prometheus.io/scrape: "true"

# ── ServiceAccount ───────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/test-role
  labels:
    app.type: workload

# ── RBAC ─────────────────────────────────────────────────────
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["configmaps", "secrets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "list"]
  clusterRules:
    - apiGroups: [""]
      resources: ["nodes", "namespaces"]
      verbs: ["get", "list", "watch"]
  extraSubjects:
    - kind: Group
      name: devops-team
      apiGroup: rbac.authorization.k8s.io
  annotations:
    rbac-managed-by: helm
  labels:
    rbac-scope: namespace

# ── HPA ──────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70
  targetMemory: 80

# ── PDB ──────────────────────────────────────────────────────
pdb:
  create: true
  minAvailable: 1

# ── External Secrets Operator ─────────────────────────────────
eso:
  externalSecrets:
    app-secret:
      labels:
        eso-managed: "true"
      spec:
        refreshInterval: "1h"
        secretStoreRef:
          name: test-store
          kind: SecretStore
        target:
          creationPolicy: Owner
          deletionPolicy: Retain
        data:
          - secretKey: password
            remoteRef:
              key: /test/password
