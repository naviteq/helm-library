    ## @section External Secrets Operator
    ## All ESO resources are disabled by default (empty dicts = no resources rendered).
    ## Each dict key becomes the resource name suffix: <fullname>-<key>.
    ## Every entry accepts .labels, .annotations, and .spec (passed through as-is).
    ##
    ## ref: https://external-secrets.io/latest/
    ##
    eso:

      ## @param eso.externalSecrets Dict of ExternalSecret CRs to create (external-secrets.io/v1)
      ## Included in the main app template (library.app).
      ## Example:
      ##   externalSecrets:
      ##     app-db:
      ##       labels: {}
      ##       annotations: {}
      ##       spec:
      ##        tenantId: 11111111-2222-3333-4444-111111111111
      ##        registry: example.azurecr.io
      ##        auth:
      ##          managedIdentity:
      ##            identityId: 11111111-2222-3333-4444-111111111111
      ##
      externalSecrets: {}

      ## @param eso.secretStores Dict of SecretStore CRs to create (external-secrets.io/v1)
      ## Example:
      ##   secretStores:
      ##     aws-sm:
      ##       spec:
      ##         provider:
      ##           aws:
      ##             service: SecretsManager
      ##             region: us-east-1
      ##             auth:
      ##               secretRef:
      ##                 accessKeyIDSecretRef:
      ##                   name: aws-creds
      ##                   key: access-key
      ##                 secretAccessKeySecretRef:
      ##                   name: aws-creds
      ##                   key: secret-key
      ##
      secretStores: {}

      ## @param eso.clusterSecretStores Dict of ClusterSecretStore CRs to create (external-secrets.io/v1)
      ## Cluster-scoped — no namespace added to metadata.
      ## Example:
      ##   clusterSecretStores:
      ##     global-aws-sm:
      ##       spec:
      ##         provider:
      ##           aws:
      ##             service: SecretsManager
      ##             region: us-east-1
      ##             auth:
      ##               jwt:
      ##                 serviceAccountRef:
      ##                   name: external-secrets-sa
      ##                   namespace: external-secrets
      ##
      clusterSecretStores: {}

      ## @param eso.clusterExternalSecrets Dict of ClusterExternalSecret CRs (external-secrets.io/v1)
      ## Cluster-scoped — propagates ExternalSecrets to multiple namespaces.
      ## Example:
      ##   clusterExternalSecrets:
      ##     shared-config:
      ##       spec:
      ##         namespaceSelector:
      ##           matchLabels:
      ##             eso-enabled: "true"
      ##         refreshTime: "1h"
      ##         externalSecretSpec:
      ##           refreshInterval: "1h"
      ##           secretStoreRef:
      ##             name: global-aws-sm
      ##             kind: ClusterSecretStore
      ##           target:
      ##             creationPolicy: Owner
      ##           data:
      ##             - secretKey: shared-key
      ##               remoteRef:
      ##                 key: /shared/config
      ##
      clusterExternalSecrets: {}

      ## @param eso.pushSecrets Dict of PushSecret CRs to create (external-secrets.io/v1alpha1)
      ## Pushes K8s Secret values to an external provider.
      ## Example:
      ##   pushSecrets:
      ##     push-to-vault:
      ##       spec:
      ##         refreshInterval: "1h"
      ##         secretStoreRefs:
      ##           - name: vault-store
      ##             kind: SecretStore
      ##         selector:
      ##           secret:
      ##             name: my-k8s-secret
      ##         data:
      ##           - match:
      ##               secretKey: password
      ##               remoteRef:
      ##                 remoteKey: myapp/password
      ##
      pushSecrets: {}

      ## @param eso.clusterPushSecrets Dict of ClusterPushSecret CRs (external-secrets.io/v1alpha1)
      ## Cluster-scoped variant of PushSecret.
      ##
      clusterPushSecrets: {}

      ## Generator resources — create short-lived credentials or random values on demand.
      ## ref: https://external-secrets.io/latest/api/generator/
      ##
      generators:

        ## @param eso.generators.acrAccessToken Dict of ACRAccessToken generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Example:
        ##   acrAccessToken:
        ##     my-ecr:
        ##       spec:
        ##        dataFrom:
        ##          - sourceRef:
        ##              generatorRef:
        ##                apiVersion: generators.external-secrets.io/v1alpha1
        ##                kind: ACRAccessToken
        ##                name: my-azurecr
        ##        refreshInterval: 30h0s
        ##        target:
        ##          name: azurecr-credentials
        ##          template:
        ##            type: kubernetes.io/dockerconfigjson
        ##            data:
        ##              .dockerconfigjson: |
        ##                {
        ##                  "auths": {
        ##                    "myregistry.azurecr.io": {
        ##                      "username": "{{ .username }}",
        ##                      "password": "{{ .password }}"
        ##                    }
        ##                  }
        ##                }
        ##
        acrAccessToken: {}

        ## @param eso.generators.ecrAuthorizationTokens Dict of ECRAuthorizationToken generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Example:
        ##   ecrAuthorizationTokens:
        ##     my-ecr:
        ##       spec:
        ##         region: us-east-1
        ##         auth:
        ##           secretRef:
        ##             accessKeyIDSecretRef:
        ##               name: aws-creds
        ##               key: access-key
        ##             secretAccessKeySecretRef:
        ##               name: aws-creds
        ##               key: secret-key
        ##
        ecrAuthorizationTokens: {}

        ## @param eso.generators.stsSessionTokens Dict of STSSessionToken generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Example:
        ##   stsSessionTokens:
        ##     my-sts:
        ##       spec:
        ##         region: us-east-1
        ##         role: arn:aws:iam::123456789012:role/my-role
        ##
        stsSessionTokens: {}

        ## @param eso.generators.clusterGenerators Dict of ClusterGenerator resources
        ## (external-secrets.io/v1alpha1, cluster-scoped)
        ## Wraps any generator type for cluster-wide reuse.
        ## Example:
        ##   clusterGenerators:
        ##     shared-password:
        ##       spec:
        ##         kind: Password
        ##         generator:
        ##           passwordSpec:
        ##             length: 32
        ##             digits: 8
        ##             symbols: 4
        ##             noUpper: false
        ##             allowRepeat: true
        ##
        clusterGenerators: {}

        ## @param eso.generators.gcrAccessTokens Dict of GCRAccessToken generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Example:
        ##   gcrAccessTokens:
        ##     my-gcr:
        ##       spec:
        ##         projectID: my-gcp-project
        ##         auth:
        ##           workloadIdentity:
        ##             clusterLocation: us-central1
        ##             clusterName: my-cluster
        ##             clusterProjectID: my-gcp-project
        ##             serviceAccountRef:
        ##               name: my-k8s-sa
        ##
        gcrAccessTokens: {}

        ## @param eso.generators.passwords Dict of Password generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Example:
        ##   passwords:
        ##     app-password:
        ##       spec:
        ##         length: 24
        ##         digits: 6
        ##         symbols: 4
        ##         symbolCharacters: "!@#%^&*"
        ##         noUpper: false
        ##         allowRepeat: false
        ##
        passwords: {}

        ## @param eso.generators.fakes Dict of Fake generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Returns static values — useful for development/testing.
        ## Example:
        ##   fakes:
        ##     mock-creds:
        ##       spec:
        ##         data:
        ##           username: admin
        ##           password: dev-password
        ##
        fakes: {}

        ## @param eso.generators.uuids Dict of UUID generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Generates a random UUID on each refresh.
        ## Example:
        ##   uuids:
        ##     request-id:
        ##       spec: {}
        ##
        uuids: {}

        ## @param eso.generators.githubAccessTokens Dict of GithubAccessToken generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Generates short-lived GitHub App installation access tokens.
        ## ref: https://external-secrets.io/latest/api/generator/github/
        ##
        githubAccessTokens: {}

        ## @param eso.generators.vaultDynamicSecrets Dict of VaultDynamicSecret generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Generates secrets dynamically from HashiCorp Vault.
        ## ref: https://external-secrets.io/latest/api/generator/vault/
        ##
        vaultDynamicSecrets: {}

        ## @param eso.generators.webhooks Dict of Webhook generators
        ## (generators.external-secrets.io/v1alpha1, cluster-scoped)
        ## Calls an external HTTP endpoint to generate secret values.
        ## ref: https://external-secrets.io/latest/api/generator/webhook/
        ##
        webhooks: {}

        ## @param eso.generators.mfas Dict of MFA generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Generates RFC 4226 compliant TOTP tokens.
