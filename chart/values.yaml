        ##
        mfas: {}

        ## @param eso.generators.sshKeys Dict of SSHKey generators
        ## (generators.external-secrets.io/v1alpha1, namespaced)
        ## Generates SSH key pairs (Ed25519, RSA, ECDSA).
        ## ref: https://external-secrets.io/latest/api/generator/sshkey/
        ##
        sshKeys: {}

    ## KEDA — Kubernetes Event-driven Autoscaling
    ## ref: https://keda.sh/docs/latest/
    ##
    ## All resource dicts are disabled by default (empty = no resources rendered).
    ## Each dict key becomes the resource name suffix: <fullname>-<key>.
    ## Every entry accepts .labels, .annotations, and .spec (passed through as-is).
    ##
    ## When keda.scaledObjects is non-empty, HPA (autoscaling.enabled) is suppressed
    ## automatically — KEDA ScaledObjects take ownership of workload scaling.
    ##
    keda:

      ## @param keda.scaledObjects Dict of ScaledObject CRs to create (keda.sh/v1alpha1, namespaced)
      ## Suppresses HPA when non-empty.
      ## Example:
      ##   scaledObjects:
      ##     main:
      ##       labels: {}
      ##       annotations: {}
      ##       spec:
      ##         scaleTargetRef:
      ##           name: my-deployment
      ##         minReplicaCount: 1
      ##         maxReplicaCount: 10
      ##         triggers:
      ##           - type: cpu
      ##             metricType: Utilization
      ##             metadata:
      ##               value: "70"
      ##
      scaledObjects: {}

      ## @param keda.scaledJobs Dict of ScaledJob CRs to create (keda.sh/v1alpha1, namespaced)
      ## Example:
      ##   scaledJobs:
      ##     queue-worker:
      ##       spec:
      ##         jobTargetRef:
      ##           parallelism: 1
      ##           completions: 1
      ##           template:
      ##             spec:
      ##               containers:
      ##                 - name: worker
      ##                   image: busybox
      ##         triggers:
      ##           - type: rabbitmq
      ##             metadata:
      ##               queueName: tasks
      ##               mode: QueueLength
      ##               value: "5"
      ##
      scaledJobs: {}

      ## @param keda.triggerAuthentications Dict of TriggerAuthentication CRs (keda.sh/v1alpha1, namespaced)
      ## Referenced by ScaledObjects/ScaledJobs in the same namespace.
      ## Example:
      ##   triggerAuthentications:
      ##     aws-auth:
      ##       spec:
      ##         secretTargetRef:
      ##           - parameter: awsAccessKeyID
      ##             name: keda-aws-secret
      ##             key: AWS_ACCESS_KEY_ID
      ##           - parameter: awsSecretAccessKey
      ##             name: keda-aws-secret
      ##             key: AWS_SECRET_ACCESS_KEY
      ##
      triggerAuthentications: {}

      ## @param keda.clusterTriggerAuthentications Dict of ClusterTriggerAuthentication CRs (keda.sh/v1alpha1, cluster-scoped)
      ## Referenced by ScaledObjects/ScaledJobs across all namespaces.
      ## Example:
      ##   clusterTriggerAuthentications:
      ##     shared-aws-auth:
      ##       spec:
      ##         secretTargetRef:
      ##           - parameter: awsAccessKeyID
      ##             name: keda-aws-secret
      ##             key: AWS_ACCESS_KEY_ID
      ##
      clusterTriggerAuthentications: {}

    ## GCP — Google Kubernetes Engine specific resources
    ## ref: https://cloud.google.com/kubernetes-engine/docs/how-to/ingress-configuration
    ##
    ## All resource dicts are disabled by default (empty = no resources rendered).
    ## Each dict key becomes the resource name suffix: <fullname>-<key>.
    ## Every entry accepts .labels, .annotations, and .spec (passed through as-is).
    ##
    gcp:

      ## @param gcp.backendConfigs Dict of BackendConfig CRs to create (cloud.google.com/v1, namespaced)
      ## Configures GKE backend behavior per Service port: CDN, security policies,
      ## IAP, connection draining, timeouts, and custom health checks.
      ## Associate with a Service via annotation:
      ##   cloud.google.com/backend-config: '{"default": "<fullname>-<key>"}'
      ## Example:
      ##   backendConfigs:
      ##     cdn:
      ##       spec:
      ##         cdn:
      ##           enabled: true
      ##           cachePolicy:
      ##             includeHost: true
      ##             includeProtocol: true
      ##             includeQueryString: false
      ##         timeoutSec: 30
      ##         connectionDraining:
      ##           drainingTimeoutSec: 60
      ##
      backendConfigs: {}

      ## @param gcp.frontendConfigs Dict of FrontendConfig CRs to create (networking.gke.io/v1beta1, namespaced)
      ## Configures GKE Ingress frontend behavior: SSL policies and HTTP-to-HTTPS redirects.
      ## Associate with an Ingress via annotation:
      ##   networking.gke.io/v1beta1.FrontendConfig: <fullname>-<key>
      ## Example:
      ##   frontendConfigs:
      ##     redirect:
      ##       spec:
      ##         redirectToHttps:
      ##           enabled: true
      ##           responseCodeName: MOVED_PERMANENTLY_DEFAULT
      ##         sslPolicy: my-ssl-policy
      ##
      frontendConfigs: {}

      ## @param gcp.managedCertificates Dict of ManagedCertificate CRs to create (networking.gke.io/v1, namespaced)
      ## GCP-managed TLS certificates — GKE provisions and renews them automatically.
      ## Associate with an Ingress via annotation:
      ##   networking.gke.io/managed-certificates: <fullname>-<key>
      ## Example:
      ##   managedCertificates:
      ##     app-cert:
      ##       spec:
      ##         domains:
      ##           - app.example.com
      ##           - www.app.example.com
      ##
      managedCertificates: {}

    ## ────────────────────────────────────────────────────────────────────────
    ## AWS EKS-specific resource configuration
    ## Each dict key becomes the resource name suffix: <fullname>-<key>.
    ## Every entry accepts .labels, .annotations, and .spec (passed through as-is).
    ##
    aws:

      ## @param aws.eniConfigs Dict of ENIConfig CRs to create (crd.k8s.amazonaws.com/v1alpha1, cluster-scoped)
      ## Enables custom networking in EKS — maps an availability zone to a
      ## specific subnet and security groups for secondary pod ENIs.
      ## Requires AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG=true on the aws-node DaemonSet.
      ## Example:
      ##   eniConfigs:
      ##     us-east-1a:
      ##       spec:
      ##         securityGroups:
      ##           - sg-0123456789abcdef0
      ##         subnet: subnet-0123456789abcdef0
      ##
      eniConfigs: {}

      ## @param aws.ingressClassParams Dict of IngressClassParams CRs to create (elbv2.k8s.aws/v1beta1, cluster-scoped)
      ## Configures the AWS Load Balancer Controller ingress class:
      ## scheme, IP address type, load balancer attributes, tags, etc.
      ## Reference from an IngressClass via:
      ##   spec.parameters.apiGroup: elbv2.k8s.aws
      ##   spec.parameters.kind: IngressClassParams
      ##   spec.parameters.name: <fullname>-<key>
      ## Example:
      ##   ingressClassParams:
      ##     public:
      ##       spec:
      ##         scheme: internet-facing
      ##         ipAddressType: ipv4
      ##         tags:
      ##           - key: Environment
      ##             value: prod
      ##
      ingressClassParams: {}

      ## @param aws.targetGroupBindings Dict of TargetGroupBinding CRs to create (elbv2.k8s.aws/v1beta1, namespaced)
      ## Binds a Kubernetes Service to an existing AWS Target Group, allowing
      ## an ALB/NLB managed outside Kubernetes to route traffic to pod IPs.
      ## Example:
      ##   targetGroupBindings:
      ##     web:
      ##       spec:
      ##         serviceRef:
      ##           name: my-service
      ##           port: 80
      ##         targetGroupARN: arn:aws:elasticloadbalancing:us-east-1:123456789012:targetgroup/my-tg/abc123
      ##         targetType: ip
      ##         networking:
      ##           ingress:
      ##             - from:
      ##                 - securityGroup:
      ##                     groupID: sg-0123456789abcdef0
      ##               ports:
      ##                 - port: 80
      ##
      targetGroupBindings: {}

      ## @param aws.securityGroupPolicies Dict of SecurityGroupPolicy CRs to create (vpcresources.k8s.aws/v1beta1, namespaced)
      ## Assigns AWS Security Groups to pods matching a label selector.
      ## Requires ENABLE_POD_ENI=true on the aws-node DaemonSet and the
      ## VPC Resource Controller add-on.
      ## Example:
      ##   securityGroupPolicies:
      ##     app:
      ##       spec:
      ##         podSelector:
      ##           matchLabels:
      ##             app: my-app
      ##         securityGroups:
      ##           groupIds:
      ##             - sg-0123456789abcdef0
      ##
      securityGroupPolicies: {}

    ## ────────────────────────────────────────────────────────────────────────
    ## Kubernetes Gateway API resource configuration
    ## Each dict key becomes the resource name suffix: <fullname>-<key>.
    ## Every entry accepts .labels, .annotations, and .spec (passed through as-is).
    ##
    apiGateway:

      ## @param apiGateway.gateways Dict of Gateway CRs to create (gateway.networking.k8s.io/v1, namespaced)
      ## Defines cluster entry points — binds a GatewayClass to listeners
      ## (port, protocol, hostname, TLS config).
      ## Example:
      ##   gateways:
      ##     main:
      ##       spec:
      ##         gatewayClassName: nginx
      ##         listeners:
      ##           - name: http
      ##             protocol: HTTP
      ##             port: 80
      ##           - name: https
      ##             protocol: HTTPS
      ##             port: 443
      ##             tls:
      ##               certificateRefs:
      ##                 - name: my-cert
      ##
      gateways: {}

      ## @param apiGateway.httpRoutes Dict of HTTPRoute CRs to create (gateway.networking.k8s.io/v1, namespaced)
      ## Defines HTTP/HTTPS routing rules: path matching, header matching,
      ## traffic splitting, redirects, and URL rewrites.
      ## Example:
      ##   httpRoutes:
      ##     main:
      ##       spec:
      ##         parentRefs:
      ##           - name: my-gateway
      ##         hostnames:
      ##           - app.example.com
      ##         rules:
      ##           - matches:
      ##               - path:
      ##                   type: PathPrefix
      ##                   value: /
      ##             backendRefs:
      ##               - name: my-service
      ##                 port: 80
      ##
      httpRoutes: {}

      ## @param apiGateway.tlsRoutes Dict of TLSRoute CRs to create (gateway.networking.k8s.io/v1alpha2, namespaced)
      ## Defines TLS passthrough routing by SNI hostname — forwards TCP without
      ## terminating TLS at the gateway.
      ## Example:
      ##   tlsRoutes:
      ##     passthrough:
      ##       spec:
      ##         parentRefs:
      ##           - name: my-gateway
      ##         hostnames:
      ##           - db.example.com
      ##         rules:
      ##           - backendRefs:
      ##               - name: my-db-service
      ##                 port: 5432
      ##
      tlsRoutes: {}

      ## @param apiGateway.tcpRoutes Dict of TCPRoute CRs to create (gateway.networking.k8s.io/v1alpha2, namespaced)
      ## Defines raw TCP routing rules — forwards connections without
      ## protocol-level inspection.
      ## Example:
      ##   tcpRoutes:
      ##     redis:
      ##       spec:
      ##         parentRefs:
      ##           - name: my-gateway
      ##             sectionName: tcp
      ##         rules:
      ##           - backendRefs:
      ##               - name: redis-service
      ##                 port: 6379
      ##
      tcpRoutes: {}

      ## @param apiGateway.grpcRoutes Dict of GRPCRoute CRs to create (gateway.networking.k8s.io/v1, namespaced)
      ## Defines gRPC routing rules — matching by service/method names,
      ## header matching, and traffic splitting.
      ## Example:
      ##   grpcRoutes:
      ##     main:
      ##       spec:
      ##         parentRefs:
      ##           - name: my-gateway
      ##         hostnames:
      ##           - grpc.example.com
      ##         rules:
      ##           - matches:
      ##               - method:
      ##                   service: com.example.MyService
      ##             backendRefs:
      ##               - name: grpc-service
      ##                 port: 9090
      ##
      grpcRoutes: {}

    ## Pod Disruption Budget configuration
    ## ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
    ##
    pdb:
      ## @param pdb.create Created a PodDisruptionBudget
      ##
      create: true
      ## @param pdb.minAvailable Min number of pods that must still be available after the eviction.
      ## You can specify an integer or a percentage by setting the value to a string representation of a percentage (eg. "50%"). It will be disabled if set to 0
      ##
      minAvailable: ""
      ## @param pdb.maxUnavailable Max number of pods that can be unavailable after the eviction.
      ## You can specify an integer or a percentage by setting the value to a string representation of a percentage (eg. "50%"). It will be disabled if set to 0. Defaults to `1` if both `pdb.minAvailable` and `pdb.maxUnavailable` are empty.
      ##
      maxUnavailable: ""

  ## @section Production preset
  ## Values tuned to Naviteq internal best practices for production workloads.
  ## Consumer charts can selectively copy/override these into their own values.
  ##
  ## Usage in a consumer chart's values.yaml:
  ##   replicaCount: 2              # from production preset
  ##   resources:
  ##     requests:
  ##       cpu: 100m                # MUST be set explicitly per workload
  ##       memory: 128Mi            # MUST be set explicitly per workload
  ##
  production:
    ## At least 2 replicas for high availability
    replicaCount: 2

    ## Keep less history in etcd for production
    revisionHistoryLimit: 5

    ## Hard anti-affinity ensures pods land on different nodes
    podAntiAffinityPreset: hard

    ## Rolling update with zero downtime
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0

    ## Graceful shutdown window
    terminationGracePeriodSeconds: 60

    ## Run containers as non-root by default
    podSecurityContext:
      enabled: true
      fsGroup: 1001
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    ## PDB: always keep at least 1 pod available
    pdb:
      create: true
      minAvailable: 1
      maxUnavailable: ""

    ## Conservative HPA thresholds to avoid thrashing
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
      targetMemory: 80
      metrics: []

    ## Enable liveness / readiness probes — configure per-workload
    livenessProbe:
      enabled: false

    readinessProbe:
      enabled: false

    startupProbe:
      enabled: false

    ## Resources MUST be set per workload — no defaults provided intentionally.
    ## Helm will fail if resources.requests.memory or resources.requests.cpu are missing.
    ## resources:
    ##   requests:
    ##     cpu: 100m
    ##     memory: 128Mi
    ##   limits:
    ##     cpu: 500m
    ##     memory: 512Mi
