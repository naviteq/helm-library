{{- define "library.statefulSet" -}}
---
apiVersion: {{ include "common.capabilities.statefulset.apiVersion" . }}
kind: StatefulSet
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.labels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.labels "context" $ ) | nindent 4 }}
    {{- end }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if or .Values.annotations .Values.commonAnnotations }}
  annotations:
    {{- if .Values.annotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.annotations "context" $) | nindent 4 }}
    {{- end }}
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" . | nindent 6 }}
  serviceName: {{ default (include "common.names.fullname" .) .Values.statefulSet.serviceName }}
  {{- if .Values.statefulSet.podManagementPolicy }}
  podManagementPolicy: {{ .Values.statefulSet.podManagementPolicy }}
  {{- end }}
  {{- if .Values.statefulSet.minReadySeconds }}
  minReadySeconds: {{ .Values.statefulSet.minReadySeconds }}
  {{- end }}
  {{- if .Values.statefulSet.ordinals }}
  ordinals: {{- toYaml .Values.statefulSet.ordinals | nindent 4 }}
  {{- end }}
  {{- if .Values.statefulSet.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy: {{- toYaml .Values.statefulSet.persistentVolumeClaimRetentionPolicy | nindent 4 }}
  {{- end }}
  {{- if .Values.updateStrategy }}
  updateStrategy: {{- toYaml .Values.updateStrategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      annotations:
        {{- if .Values.podAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" .Values.podAnnotations "context" $) | nindent 8 }}
        {{- end }}
        helm.sh/revision: {{ .Release.Revision | quote }}
      labels: {{- include "common.labels.standard" . | nindent 8 }}
        {{- if .Values.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" .Values.podLabels "context" $) | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.initContainers }}
      initContainers: {{- include "common.tplvalues.render" (dict "value" .Values.initContainers "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.podRestartPolicy }}
      restartPolicy: {{ .Values.podRestartPolicy }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          image: {{ include "library.image" (dict "imageRoot" .Values.image "global" .Values.global "chart" .Chart) }}
          imagePullPolicy: {{ default (eq .Values.image.tag "latest" | ternary "Always" "IfNotPresent") .Values.image.pullPolicy }}
          {{- if .Values.diagnosticMode.enabled }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.command "context" $) | nindent 12 }}
          {{- else if .Values.command }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.command "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.args "context" $) | nindent 12 }}
          {{- else if .Values.args }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.args "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.envVars }}
          env: {{- include "library.toEnvArray" (dict "envVars" .Values.envVars "context" $) | indent 12 }}
          {{- end }}
          {{- if or .Values.envVarsConfigMap .Values.envVarsSecret .Values.externalSecrets }}
          envFrom:
            {{- if .Values.envVarsConfigMap }}
            - configMapRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.envVarsConfigMap "context" $) }}
            {{- end }}
            {{- if .Values.envVarsSecret }}
            - secretRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.envVarsSecret "context" $) }}
            {{- end }}
            {{- range $name, $secret := .Values.externalSecrets }}
            {{- if not $secret.mounted }}
            - secretRef:
                name: {{ include "common.names.fullname" $ }}-{{ $name }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if .Values.ports }}
          ports: {{- include "common.tplvalues.render" (dict "value" .Values.ports "context" $) | nindent 12 }}
          {{- end }}
          {{- if not .Values.diagnosticMode.enabled }}
          {{- if and .Values.livenessProbe.enabled (omit .Values.livenessProbe "enabled") }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.livenessProbe "enabled") "context" $) | nindent 12 }}
          {{- end }}
          {{- if and .Values.readinessProbe.enabled (omit .Values.readinessProbe "enabled") }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.readinessProbe "enabled") "context" $) | nindent 12 }}
          {{- end }}
          {{- if and .Values.startupProbe.enabled (omit .Values.startupProbe "enabled") }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.startupProbe "enabled") "context" $) | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- if .Values.lifecycleHooks }}
          lifecycle: {{- include "common.tplvalues.render" (dict "value" .Values.lifecycleHooks "context" $) | nindent 12 }}
          {{- end }}
          {{- $_ := required "resources.requests.memory is required" (dig "requests" "memory" "" .Values.resources) }}
          {{- $_ := required "resources.requests.cpu is required" (dig "requests" "cpu" "" .Values.resources) }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.configMaps .Values.extraVolumeMounts .Values.externalSecrets .Values.secret.mounted .Values.statefulSet.volumeClaimTemplates }}
          volumeMounts:
            {{- range $name, $cm := .Values.configMaps }}
            {{- if $cm.mounted }}
            - name: {{ include "common.names.fullname" $ }}-{{ $name }}
              mountPath: {{ $cm.mountPath }}
              {{- if $cm.subPath }}
              subPath: {{ $cm.subPath }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if and .Values.secret.mounted .Values.secret.mountPath }}
            - name: {{ include "common.names.fullname" . }}-secret
              mountPath: {{ .Values.secret.mountPath }}
              {{- if .Values.secret.subPath }}
              subPath: {{ .Values.secret.subPath }}
              {{- end }}
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" $) | nindent 12 }}
            {{- end }}
            {{- range $name, $secret := .Values.externalSecrets }}
            {{- if $secret.mounted }}
            - name: {{ include "common.names.fullname" $ }}-{{ $name }}
              mountPath: {{ $secret.mountPath }}
              {{- if $secret.subPath }}
              subPath: {{ $secret.subPath }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- range $name, $pvc := .Values.statefulSet.volumeClaimTemplates }}
            - name: {{ $pvc.metadata.name }}
              mountPath: {{ $pvc.mountPath | default (printf "/data/%s" $pvc.metadata.name) }}
              {{- if $pvc.subPath }}
              subPath: {{ $pvc.subPath }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- if .Values.sidecars }}
        {{- include "common.tplvalues.render" (dict "value" .Values.sidecars "context" $) | nindent 8 }}
        {{- end }}
      {{- if or .Values.configMaps .Values.extraVolumes .Values.externalSecrets .Values.secret.mounted }}
      volumes:
        {{- if .Values.configMaps }}
        {{- range $name, $cm := .Values.configMaps }}
        - name: {{ include "common.names.fullname" $ }}-{{ $name }}
          configMap:
            name: {{ include "common.names.fullname" $ }}-{{ $name }}
            {{- if $cm.defaultMode }}
            defaultMode: {{ $cm.defaultMode }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if and .Values.secret.mounted .Values.secret.mountPath }}
        - name: {{ include "common.names.fullname" . }}-secret
          secret:
            secretName: {{ include "common.names.fullname" . }}
            {{- if .Values.secret.defaultMode }}
            defaultMode: {{ .Values.secret.defaultMode }}
            {{- end }}
            {{- if .Values.secret.items }}
            items: {{- toYaml .Values.secret.items | nindent 12 }}
            {{- end }}
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.extraVolumes "context" $) | nindent 8 }}
        {{- end }}
        {{- range $name, $secret := .Values.externalSecrets }}
        {{- if $secret.mounted }}
        - name: {{ include "common.names.fullname" $ }}-{{ $name }}
          secret:
            secretName: {{ include "common.names.fullname" $ }}-{{ $name }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- include "common.images.renderPullSecrets" (dict "images" (list .Values.image) "context" $) | indent 6 }}
      {{- if .Values.hostAliases }}
      hostAliases: {{- include "common.tplvalues.render" (dict "value" .Values.hostAliases "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity: {{- include "common.tplvalues.render" ( dict "value" .Values.affinity "context" $) | nindent 8 }}
      {{- else if or .Values.podAffinityPreset .Values.podAntiAffinityPreset .Values.nodeAffinityPreset.type }}
      affinity:
        {{- if not (empty .Values.podAffinityPreset) }}
        podAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAffinityPreset "context" $) | nindent 10 }}
        {{- end }}
        {{- if not (empty .Values.podAntiAffinityPreset) }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAntiAffinityPreset "context" $) | nindent 10 }}
        {{- end }}
        {{- if not (empty .Values.nodeAffinityPreset.type) }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.nodeAffinityPreset.type "key" .Values.nodeAffinityPreset.key "values" .Values.nodeAffinityPreset.values) | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" (dict "value" .Values.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.tolerations "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- include "common.tplvalues.render" (dict "value" .Values.topologySpreadConstraints "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName | quote }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{- omit .Values.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      serviceAccountName: {{ include "library.serviceAccountName" . }}
  {{- if .Values.statefulSet.volumeClaimTemplates }}
  volumeClaimTemplates:
    {{- range .Values.statefulSet.volumeClaimTemplates }}
    - metadata:
        name: {{ .metadata.name }}
        {{- if .metadata.labels }}
        labels: {{- toYaml .metadata.labels | nindent 10 }}
        {{- end }}
        {{- if .metadata.annotations }}
        annotations: {{- toYaml .metadata.annotations | nindent 10 }}
        {{- end }}
      spec: {{- toYaml .spec | nindent 8 }}
    {{- end }}
  {{- end }}
{{- end -}}
