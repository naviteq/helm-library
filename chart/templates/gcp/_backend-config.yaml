{{/*
Render BackendConfig CRs from .Values.gcp.backendConfigs dict.
Each key becomes a resource named <fullname>-<key>.
BackendConfigs configure GKE backend behavior per Service port:
CDN, security policies, IAP, timeouts, health checks, session affinity.

To associate with a Service port, annotate the Service:
  cloud.google.com/backend-config: '{"default": "<fullname>-<key>"}'

apiVersion: cloud.google.com/v1
ref: https://cloud.google.com/kubernetes-engine/docs/how-to/ingress-configuration
*/}}
{{- define "library.backendConfigs" -}}
{{- range $name, $bc := .Values.gcp.backendConfigs }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $bc
  "kind"       "BackendConfig"
  "apiVersion" "cloud.google.com/v1"
  "namespaced" true
  "context"    $) }}
{{- end }}
{{- end -}}
