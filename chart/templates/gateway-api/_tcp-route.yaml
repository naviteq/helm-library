{{/*
Render TCPRoute CRs from .Values.apiGateway.tcpRoutes dict.
Each key becomes a resource named <fullname>-<key>.
TCPRoutes define raw TCP routing rules, forwarding TCP connections to
backend services without protocol-level inspection.

apiVersion: gateway.networking.k8s.io/v1alpha2
ref: https://gateway-api.sigs.k8s.io/guides/tcp/
*/}}
{{- define "library.tcpRoutes" -}}
{{- range $name, $tr := .Values.apiGateway.tcpRoutes }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $tr
  "kind"       "TCPRoute"
  "apiVersion" "gateway.networking.k8s.io/v1alpha2"
  "namespaced" true
  "context"    $) }}
{{- end }}
{{- end -}}
