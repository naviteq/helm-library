{{/*
Render Gateway CRs from .Values.apiGateway.gateways dict.
Each key becomes a resource named <fullname>-<key>.
Gateways define entry points for traffic into the cluster — they reference
a GatewayClass and configure listeners (ports, protocols, TLS, hostnames).

apiVersion: gateway.networking.k8s.io/v1
ref: https://gateway-api.sigs.k8s.io/guides/simple-gateway/
*/}}
{{- define "library.gateways" -}}
{{- range $name, $gw := .Values.apiGateway.gateways }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $gw
  "kind"       "Gateway"
  "apiVersion" "gateway.networking.k8s.io/v1"
  "namespaced" true
  "context"    $) }}
{{- end }}
{{- end -}}
