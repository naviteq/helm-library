{{/*
Render ExternalSecret CRs from .Values.eso.externalSecrets dict.
Each key in the dict becomes a resource named <fullname>-<key>.
Included in library.app — rendered when eso.externalSecrets is non-empty.

apiVersion: external-secrets.io/v1
ref: https://external-secrets.io/latest/api/externalsecret/
*/}}
{{- define "library.externalSecrets" -}}
{{- range $name, $es := .Values.eso.externalSecrets }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $es
  "kind"       "ExternalSecret"
  "apiVersion" "external-secrets.io/v1"
  "namespaced" true
  "context"    $) }}
{{- end }}
{{- end -}}
