{{/*
Render ClusterExternalSecret CRs from .Values.eso.clusterExternalSecrets dict.
Cluster-scoped: no namespace in metadata.

apiVersion: external-secrets.io/v1
ref: https://external-secrets.io/latest/api/clusterexternalsecret/
*/}}
{{- define "library.clusterExternalSecrets" -}}
{{- range $name, $ces := .Values.eso.clusterExternalSecrets }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $ces
  "kind"       "ClusterExternalSecret"
  "apiVersion" "external-secrets.io/v1"
  "namespaced" false
  "context"    $) }}
{{- end }}
{{- end -}}
