{{/*
Render ClusterSecretStore CRs from .Values.eso.clusterSecretStores dict.
Cluster-scoped: no namespace in metadata.

apiVersion: external-secrets.io/v1
ref: https://external-secrets.io/latest/api/clustersecretstore/
*/}}
{{- define "library.clusterSecretStores" -}}
{{- range $name, $store := .Values.eso.clusterSecretStores }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $store
  "kind"       "ClusterSecretStore"
  "apiVersion" "external-secrets.io/v1"
  "namespaced" false
  "context"    $) }}
{{- end }}
{{- end -}}
