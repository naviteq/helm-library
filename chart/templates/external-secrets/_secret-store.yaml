{{/*
Render SecretStore CRs from .Values.eso.secretStores dict.
Each key becomes a resource named <fullname>-<key>.
Namespace-scoped.

apiVersion: external-secrets.io/v1
ref: https://external-secrets.io/latest/api/secretstore/
*/}}
{{- define "library.secretStores" -}}
{{- range $name, $store := .Values.eso.secretStores }}
{{ include "library._crdResource" (dict
  "name"       $name
  "res"        $store
  "kind"       "SecretStore"
  "apiVersion" "external-secrets.io/v1"
  "namespaced" true
  "context"    $) }}
{{- end }}
{{- end -}}
